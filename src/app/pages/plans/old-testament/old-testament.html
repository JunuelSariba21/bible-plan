<app-navbar></app-navbar>

<div class="plan-container">
  <div class="intro">
    <h1>📜 Old Testament</h1>
    <p>Journey through the Law, History, and the Prophets.</p>
  </div>

  <div class="grid">
    <app-reading-card
      *ngFor="let item of plans"
      [day]="item.day"
      [label]="item.label"
      [book]="item.book"
      [start]="item.start"
      [end]="item.end"
      (read)="loadVerse($event)">
    </app-reading-card>
  </div>

  <div *ngIf="loading" class="loader">📜 Unrolling the scrolls...</div>

  <div *ngIf="verseData" class="reader-surface">
    <h2>{{ verseData.reference }}</h2>
    <div class="bible-text">
      <span *ngFor="let v of verseData.verses">
        <span class="v-num">{{ v.verse }}</span> {{ v.text }}
      </span>
    </div>
    <div class="actions">
      <button class="save-btn" (click)="markProgress()">Complete Reading ✅</button>
    </div>
  </div>
</div>

<app-footer></app-footer>
