<app-navbar></app-navbar>

<div class="auth">

  <div class="auth-card">
    <h1>Welcome Back 👋</h1>
    <p>Login to continue your Bible journey</p>

    <div *ngIf="errorMessage" class="error-box">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()">
      <input 
        type="text" 
        name="username" 
        placeholder="Username" 
        [(ngModel)]="username" 
        required
      >
      <input 
        type="password" 
        name="password" 
        placeholder="Password" 
        [(ngModel)]="password" 
        required
      >

      <button type="submit">Login</button>
    </form>

    <p class="switch">
      Don't have an account?
      <a routerLink="/register">Register</a>
    </p>
  </div>

</div>

<app-footer></app-footer>
